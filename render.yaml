services:
  # ── API Server ────────────────────────────────────────────────────────────────
  - type: web
    name: ecosort-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: GEMINI_API_KEY
        sync: false   # ← paste your key in the Render dashboard

  # ── Frontend (Static Site) ────────────────────────────────────────────────────
  -   # ── Frontend (Static Site) ────────────────────────────────────────────────────
  - type: static
    name: ecosort-frontend
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @workspace/ecosort-ai run build
    publishDir: artifacts/ecosort-ai/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: BASE_PATH
        value: /
      - key: VITE_API_URL
        sync: false
